apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-resend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-resend
  template:
    metadata:
      labels:
        app: mock-resend
    spec:
      containers:
        - name: mock-resend
          image: python:3.12-slim
          command: ["python", "/mock_resend.py"]
          ports:
            - containerPort: 8025
          volumeMounts:
            - name: script
              mountPath: /mock_resend.py
              subPath: mock_resend.py
      volumes:
        - name: script
          configMap:
            name: mock-resend-script
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mock-resend-script
  namespace: default
data:
  mock_resend.py: |
    import json
    import uuid
    from http.server import BaseHTTPRequestHandler, HTTPServer

    class MockResendHandler(BaseHTTPRequestHandler):
        def do_POST(self):
            content_length = int(self.headers.get("Content-Length", 0))
            self.rfile.read(content_length)
            self.send_response(200)
            self.send_header("Content-Type", "application/json")
            self.end_headers()
            self.wfile.write(json.dumps({"id": str(uuid.uuid4())}).encode())

        def log_message(self, format, *args):
            pass

    HTTPServer(("0.0.0.0", 8025), MockResendHandler).serve_forever()
---
apiVersion: v1
kind: Service
metadata:
  name: mock-resend
  namespace: default
spec:
  selector:
    app: mock-resend
  ports:
    - port: 8025
      targetPort: 8025
