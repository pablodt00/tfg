apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
      volumes:
      - name: config
        configMap:
          name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  selector:
    app: prometheus
  ports:
  - port: 9090
    targetPort: 9090
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
    - job_name: 'knative-services'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - default
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_serving_knative_dev_service]
        action: keep
        regex: (coingecko-service|processor-service)
      - source_labels: [__address__]
        action: replace
        target_label: __address__
        regex: ([^:]+)(?::\d+)?
        replacement: $1:8000
      - source_labels: [__meta_kubernetes_pod_label_serving_knative_dev_service]
        regex: coingecko-service
        target_label: service_name
        replacement: coingecko-api-daemon
      - source_labels: [__meta_kubernetes_pod_label_serving_knative_dev_service]
        regex: processor-service
        target_label: service_name
        replacement: processor-daemon
      metrics_path: /metrics
    - job_name: 'api-daemon'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - default
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_serving_knative_dev_service]
        action: keep
        regex: api-daemon
      - source_labels: [__address__]
        action: replace
        target_label: __address__
        regex: ([^:]+)(?::\d+)?
        replacement: $1:7654
      - target_label: service_name
        replacement: api-daemon
      metrics_path: /metrics
    - job_name: 'knative-autoscaler'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - knative-serving
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: autoscaler
      - source_labels: [__address__]
        action: replace
        target_label: __address__
        regex: ([^:]+)(?::\d+)?
        replacement: $1:9090
      metrics_path: /metrics
    - job_name: 'redpanda'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - kafka
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: redpanda
      - source_labels: [__address__]
        action: replace
        target_label: __address__
        regex: ([^:]+)(?::\d+)?
        replacement: $1:9644
      metrics_path: /public_metrics
