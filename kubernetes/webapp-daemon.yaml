apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: webapp-daemon
  namespace: default
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "0"
        autoscaling.knative.dev/max-scale: "5"
        autoscaling.knative.dev/target: "200"
        autoscaling.knative.dev/scale-down-delay: "10m"
        autoscaling.knative.dev/metric: "concurrency"
        autoscaling.knative.dev/scale-to-zero-pod-retention-period: "5m"
    spec:
      containerConcurrency: 200
      containers:
        - image: DOCKER_USER/tfg:latest
          ports:
            - containerPort: 8501
              protocol: TCP
          env:
            - name: PYTHONPATH
              value: /srv/src
          envFrom:
            - configMapRef:
                name: tfg-config
          command: ["/srv/scripts/webapp-daemon.sh"]
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
