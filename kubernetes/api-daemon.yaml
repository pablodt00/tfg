apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: api-daemon
  namespace: default
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "3"
        autoscaling.knative.dev/max-scale: "10"
        autoscaling.knative.dev/target: "50"
        autoscaling.knative.dev/metric: "concurrency"
        autoscaling.knative.dev/scale-down-delay: "60s"
    spec:
      containerConcurrency: 50
      containers:
        - image: DOCKER_USER/tfg:latest
          ports:
            - containerPort: 7654
              protocol: TCP
          env:
            - name: PYTHONPATH
              value: /srv/src
          envFrom:
            - configMapRef:
                name: tfg-config
          command: ["/srv/scripts/api_daemon.sh"]
          resources:
            requests:
              memory: "256Mi"
              cpu: "300m"
            limits:
              memory: "512Mi"
              cpu: "800m"
