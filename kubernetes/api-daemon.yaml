apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: api-daemon
  namespace: default
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "2"
        autoscaling.knative.dev/max-scale: "15"
        autoscaling.knative.dev/target: "80"
        autoscaling.knative.dev/scale-down-delay: "5m"
        autoscaling.knative.dev/metric: "rps"
        autoscaling.knative.dev/panic-window-percentage: "20"
        autoscaling.knative.dev/panic-threshold-percentage: "200"
    spec:
      containerConcurrency: 80
      containers:
        - image: DOCKER_USER/tfg:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: PYTHONPATH
              value: /srv/src
          envFrom:
            - configMapRef:
                name: tfg-config
          command: ["/srv/scripts/api_daemon.sh"]
          resources:
            requests:
              cpu: "300m"
              memory: "384Mi"
            limits:
              cpu: "800m"
              memory: "896Mi"
