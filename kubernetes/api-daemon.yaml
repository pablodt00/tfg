apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: api-daemon
  namespace: default
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "3"
        autoscaling.knative.dev/max-scale: "10"
        autoscaling.knative.dev/target: "50"
        autoscaling.knative.dev/scale-down-delay: "30s"
        autoscaling.knative.dev/metric: "concurrency"
    spec:
      containerConcurrency: 50
      containers:
        - image: DOCKER_USER/tfg:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: PYTHONPATH
              value: /srv/src
          envFrom:
            - configMapRef:
                name: tfg-config
          command: ["/srv/scripts/api_daemon.sh"]
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
