apiVersion: eventing.knative.dev/v1
kind: Trigger
metadata:
  name: processor-trigger
  namespace: default
spec:
  broker: kafka-broker
  delivery:
    backoffPolicy: exponential
    backoffDelay: "PT0.5S"
    retry: 3
    # deadLetterSink:
    #   ref:
    #     apiVersion: serving.knative.dev/v1
    #     kind: Service
    #     name: dlq-handler
    #     namespace: default
  subscriber:
    ref:
      apiVersion: serving.knative.dev/v1
      kind: Service
      name: processor-service
    uri: /event/
