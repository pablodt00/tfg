apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: coingecko-service
  namespace: default
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "1"
        autoscaling.knative.dev/max-scale: "8"
        autoscaling.knative.dev/target: "100"
        autoscaling.knative.dev/scale-down-delay: "2m"
        autoscaling.knative.dev/metric: "concurrency"
        autoscaling.knative.dev/target-utilization-percentage: "70"
    spec:
      containerConcurrency: 100
      containers:
        - name: coingecko-service
          image: DOCKER_USER/tfg:latest
          command: ["/bin/bash"]
          args: ["/srv/scripts/coingecko_api_daemon.sh"]
          ports:
            - name: http1
              containerPort: 8000
              protocol: TCP
          env:
            - name: PYTHONPATH
              value: "/srv/src"
          envFrom:
            - configMapRef:
                name: tfg-config
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "750m"
              memory: "768Mi"
          livenessProbe:
            httpGet:
              path: /health/ping
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ping
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
