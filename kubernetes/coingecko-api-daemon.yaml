apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: coingecko-service
  namespace: default
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "2"
        autoscaling.knative.dev/max-scale: "15"
        autoscaling.knative.dev/target: "80"
        autoscaling.knative.dev/scale-down-delay: "5m"
        autoscaling.knative.dev/metric: "rps"
        autoscaling.knative.dev/panic-window-percentage: "20"
        autoscaling.knative.dev/panic-threshold-percentage: "200"
    spec:
      containerConcurrency: 80
      containers:
        - name: coingecko-service
          image: DOCKER_USER/tfg:latest
          command: ["/bin/bash"]
          args: ["/srv/scripts/coingecko_api_daemon.sh"]
          ports:
            - name: http1
              containerPort: 8000
              protocol: TCP
          env:
            - name: PYTHONPATH
              value: "/srv/src"
          envFrom:
            - configMapRef:
                name: tfg-config
          resources:
            requests:
              cpu: "300m"
              memory: "384Mi"
            limits:
              cpu: "800m"
              memory: "896Mi"
          livenessProbe:
            httpGet:
              path: /health/ping
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ping
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
