apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: coingecko-service
  namespace: default
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "0"
        autoscaling.knative.dev/max-scale: "5"
        autoscaling.knative.dev/target: "200"
        autoscaling.knative.dev/scale-down-delay: "10m"
        autoscaling.knative.dev/metric: "concurrency"
        autoscaling.knative.dev/scale-to-zero-pod-retention-period: "5m"
    spec:
      containerConcurrency: 200
      containers:
        - name: coingecko-service
          image: DOCKER_USER/tfg:latest
          command: ["/bin/bash"]
          args: ["/srv/scripts/coingecko_api_daemon.sh"]
          ports:
            - name: http1
              containerPort: 8000
              protocol: TCP
          env:
            - name: PYTHONPATH
              value: "/srv/src"
          envFrom:
            - configMapRef:
                name: tfg-config
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health/ping
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ping
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
