apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: processor-service
  namespace: default
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "1"
        autoscaling.knative.dev/max-scale: "4"
        autoscaling.knative.dev/metric: "concurrency"
        autoscaling.knative.dev/target: "10"
        autoscaling.knative.dev/target-utilization-percentage: "70"
        autoscaling.knative.dev/scale-down-delay: "120s"
    spec:
      containerConcurrency: 10
      containers:
        - name: processor-service
          image: DOCKER_USER/tfg:latest
          command: ["/bin/bash"]
          args: ["/srv/scripts/processor_daemon.sh"]
          ports:
            - name: http1
              containerPort: 8000
              protocol: TCP
          env:
            - name: PYTHONPATH
              value: "/srv/src"
          envFrom:
            - configMapRef:
                name: tfg-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "384Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /health/ping
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ping
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
