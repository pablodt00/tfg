apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: processor-service
  namespace: default
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "0"
        autoscaling.knative.dev/max-scale: "3"
        autoscaling.knative.dev/target: "20"
        autoscaling.knative.dev/metric: "concurrency"
        autoscaling.knative.dev/scale-down-delay: "30s"
        autoscaling.knative.dev/scale-to-zero-pod-retention-period: "30s"
    spec:
      containerConcurrency: 20
      containers:
        - name: processor-service
          image: DOCKER_USER/tfg:latest
          command: ["/bin/bash"]
          args: ["/srv/scripts/processor_daemon.sh"]
          ports:
            - name: http1
              containerPort: 8000
              protocol: TCP
          env:
            - name: PYTHONPATH
              value: "/srv/src"
          envFrom:
            - configMapRef:
                name: tfg-config
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health/ping
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ping
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
